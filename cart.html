<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优选商城 - 购物车</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-top">
            <div class="container">
                <div class="header-left">
                    <a href="index.html" class="logo">
                        <img src="images/LOGO.PNG" alt="优选商城">
                    </a>
                </div>
                <div class="header-center">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="搜索商品...">
                        <button id="search-btn">搜索</button>
                    </div>
                </div>
                <div class="header-right">
                    <a href="login.html" class="nav-link">登录</a>
                    <a href="register.html" class="nav-link">注册</a>
                    <a href="cart.html" class="nav-link cart-icon active">
                        <span>购物车</span>
                        <span class="cart-count">0</span>
                    </a>
                    <a href="profile.html" class="nav-link">个人中心</a>
                </div>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="cart-main">
        <div class="container">
            <!-- 面包屑导航 -->
            <div class="breadcrumb">
                <a href="index.html">首页</a>
                <span>></span>
                <span>购物车</span>
            </div>
            
            <!-- 购物车区域 -->
            <div class="cart-container" id="cart-container">
                <!-- 购物车列表 -->
                <div class="cart-list">
                    <div class="cart-header">
                        <label class="checkbox-label">
                            <input type="checkbox" id="select-all" class="select-all">
                            <span class="checkmark"></span>
                            全选
                        </label>
                        <span class="cart-title">我的购物车</span>
                        <button class="clear-cart-btn" id="clear-cart-btn">清空购物车</button>
                    </div>
                    
                    <!-- 购物车商品列表 -->
                    <div class="cart-items" id="cart-items">
                        <!-- 购物车为空 -->
                        <div class="empty-cart" id="empty-cart">
                            <img src="images/shoppingcar.jpg" alt="购物车为空">
                            <p>购物车空空如也~</p>
                            <a href="product.html" class="go-shopping-btn">去购物</a>
                        </div>
                    </div>
                </div>
                
                <!-- 结算区域 -->
                <div class="cart-summary">
                    <div class="summary-header">
                        <h3>结算</h3>
                    </div>
                    <div class="summary-content">
                        <div class="summary-row">
                            <span>已选商品</span>
                            <span id="selected-count">0</span>
                        </div>
                        <div class="summary-row">
                            <span>商品金额</span>
                            <span id="subtotal">¥0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>运费</span>
                            <span id="shipping">¥0.00</span>
                        </div>
                        <div class="summary-row total">
                            <span>合计</span>
                            <span id="total">¥0.00</span>
                        </div>
                    </div>
                    <button class="checkout-btn" id="checkout-btn" disabled>去结算</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <p>优选商城致力于为用户提供优质的购物体验</p>
                </div>
                <div class="footer-section">
                    <h3>联系方式</h3>
                    <p>客服热线：400-888-8888</p>
                    <p>邮箱：service@youxuan.com</p>
                </div>
                <div class="footer-section">
                    <h3>关注我们</h3>
                    <img src="images/wechat.png" alt="微信公众号" class="wechat-qrcode">
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2024 优选商城 版权所有 | 学号：24215220234 | 姓名：黄贤臻</p>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
    <script src="js/search.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
