<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优选商城 - 商品列表</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/product.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-top">
            <div class="container">
                <div class="header-left">
                    <a href="index.html" class="logo">
                        <img src="images/LOGO.PNG" alt="优选商城">
                    </a>
                </div>
                <div class="header-center">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="搜索商品...">
                        <button id="search-btn">搜索</button>
                    </div>
                </div>
                <div class="header-right">
                    <a href="login.html" class="nav-link">登录</a>
                    <a href="register.html" class="nav-link">注册</a>
                    <a href="cart.html" class="nav-link cart-icon">
                        <span>购物车</span>
                        <span class="cart-count">0</span>
                    </a>
                    <a href="profile.html" class="nav-link">个人中心</a>
                </div>
            </div>
        </div>
        
        <!-- 分类导航 -->
        <nav class="category-nav">
            <div class="container">
                <ul class="category-list">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="product.html?category=fresh" class="active">生鲜食品</a></li>
                    <li><a href="product.html?category=clothes">服装服饰</a></li>
                    <li><a href="product.html?category=kitchen">厨房用品</a></li>
                    <li><a href="product.html?category=home">家居生活</a></li>
                    <li><a href="product.html?category=hot">热门推荐</a></li>
                    <li><a href="product.html?category=new">新品上市</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- 主体内容 -->
    <main class="product-main">
        <div class="container">
            <!-- 面包屑导航 -->
            <div class="breadcrumb">
                <a href="index.html">首页</a>
                <span>></span>
                <span id="current-category">全部商品</span>
            </div>
            
            <!-- 搜索结果提示 -->
            <div class="search-result" id="search-result">
                <span id="result-count">共 <strong>24</strong> 件商品</span>
            </div>
            
            <!-- 筛选区域 -->
            <div class="filter-section">
                <!-- 左侧分类筛选 -->
                <div class="filter-left">
                    <h3>商品分类</h3>
                    <ul class="filter-category">
                        <li><a href="product.html" class="active">全部商品</a></li>
                        <li><a href="product.html?category=fresh">生鲜食品</a></li>
                        <li><a href="product.html?category=clothes">服装服饰</a></li>
                        <li><a href="product.html?category=kitchen">厨房用品</a></li>
                        <li><a href="product.html?category=home">家居生活</a></li>
                    </ul>
                    
                    <h3>价格区间</h3>
                    <div class="price-filter">
                        <input type="text" id="price-min" placeholder="最低价" class="price-input">
                        <span>-</span>
                        <input type="text" id="price-max" placeholder="最高价" class="price-input">
                        <button id="price-filter-btn">筛选</button>
                    </div>
                </div>
                
                <!-- 右侧商品列表 -->
                <div class="product-section">
                    <!-- 排序选项 -->
                    <div class="sort-bar">
                        <div class="sort-options">
                            <button class="sort-btn active" data-sort="default">默认排序</button>
                            <button class="sort-btn" data-sort="price-asc">价格从低到高</button>
                            <button class="sort-btn" data-sort="price-desc">价格从高到低</button>
                            <button class="sort-btn" data-sort="sales">销量优先</button>
                        </div>
                        <div class="view-toggle">
                            <button class="view-btn active" data-view="grid">
                                <span>📦</span> 网格视图
                            </button>
                            <button class="view-btn" data-view="list">
                                <span>📋</span> 列表视图
                            </button>
                        </div>
                    </div>
                    
                    <!-- 商品网格 -->
                    <div class="product-grid" id="product-grid">
                        <!-- 商品项将通过JavaScript动态生成 -->
                    </div>
                    
                    <!-- 分页控件 -->
                    <div class="pagination" id="pagination">
                        <button class="page-btn" id="prev-page" disabled>上一页</button>
                        <div class="page-numbers">
                            <button class="page-num active">1</button>
                            <button class="page-num">2</button>
                            <button class="page-num">3</button>
                            <button class="page-num">4</button>
                            <button class="page-num">5</button>
                        </div>
                        <button class="page-btn" id="next-page">下一页</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <p>优选商城致力于为用户提供优质的购物体验</p>
                </div>
                <div class="footer-section">
                    <h3>联系方式</h3>
                    <p>客服热线：400-888-8888</p>
                    <p>邮箱：service@youxuan.com</p>
                </div>
                <div class="footer-section">
                    <h3>关注我们</h3>
                    <img src="images/wechat.png" alt="微信公众号" class="wechat-qrcode">
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2024 优选商城 版权所有 | 学号：24215220234 | 姓名：黄贤臻</p>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
    <script src="js/search.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/ajax.js"></script>
</body>
</html>
