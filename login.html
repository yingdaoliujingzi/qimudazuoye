<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优选商城 - 用户登录</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="container">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <img src="images/LOGO.PNG" alt="优选商城">
                </a>
            </div>
            <div class="header-right">
                <a href="register.html" class="nav-link">立即注册</a>
            </div>
        </div>
    </header>

    <!-- 登录主体 -->
    <main class="login-main">
        <div class="login-container">
            <div class="login-box">
                <div class="login-header">
                    <h2>用户登录</h2>
                    <p>欢迎回到优选商城</p>
                </div>
                
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="username" name="username" placeholder="请输入用户名或邮箱" required>
                        </div>
                        <span class="error-message" id="username-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" name="password" placeholder="请输入密码" required>
                            <span class="toggle-password" id="toggle-password">👁</span>
                        </div>
                        <span class="error-message" id="password-error"></span>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember-me">
                            <span class="checkmark"></span>
                            记住我
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="login-btn">登 录</button>
                </form>
                
                <div class="login-footer">
                    <p>还没有账号？<a href="register.html">立即注册</a></p>
                </div>
                
                <div class="social-login">
                    <span class="divider">或使用以下方式登录</span>
                    <div class="social-buttons">
                        <button class="social-btn wechat">
                            <span>💬</span>
                            微信登录
                        </button>
                        <button class="social-btn phone">
                            <span>📱</span>
                            手机登录
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 右侧装饰图 -->
            <div class="login-banner">
                <img src="images/banner1.png" alt="登录banner">
                <div class="banner-content">
                    <h3>品质生活 从优选开始</h3>
                    <p>精选优质商品，为您的生活添彩</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2024 优选商城 版权所有 | 学号：24215220234 | 姓名：黄贤臻</p>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
    <script src="js/form-validation.js"></script>
</body>
</html>
